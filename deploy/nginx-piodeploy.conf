# /etc/nginx/sites-available/piodeploy
# Serves the Laravel app at piodeploy.com. Certbot adds the 443 block automatically.
server {
    listen 80;
    listen [::]:80;
    server_name piodeploy.com www.piodeploy.com;

    root /var/www/piodeploy/public;
    index index.php;
    charset utf-8;

    client_max_body_size 25M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Never serve hidden files (except ACME challenges for TLS).
    location ~ /\.(?!well-known).* { deny all; }
}
